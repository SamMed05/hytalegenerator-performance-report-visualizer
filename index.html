<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HytaleGenerator Performance Report Visualizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #ffffff;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            background-color: #0e639c;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
        }
        button:hover {
            background-color: #1177bb;
        }
        button:disabled {
            background-color: #333;
            color: #777;
            cursor: not-allowed;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background-color: #252526;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            min-width: 300px;
            flex: 1;
        }
        .card h2 {
            margin-top: 0;
            color: #4cca88;
            font-size: 18px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }
        .stat-row:last-child {
            border-bottom: none;
        }
        .stat-name {
            font-weight: bold;
        }
        .stat-value {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .arrow {
            font-size: 16px;
            font-weight: bold;
        }
        .arrow.up {
            color: #f14c4c; /* Red */
        }
        .arrow.down {
            color: #89d185; /* Green */
        }
        .arrow.neutral {
            color: #808080; /* Gray */
        }
        
        #dropZone {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(14, 99, 156, 0.9);
            color: white;
            z-index: 9999;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            text-align: center;
            border: 10px dashed rgba(255,255,255,0.5);
            box-sizing: border-box;
        }
        #dropZone.active {
            display: flex;
        }
        #fileInput {
            display: none;
        }

        .charts-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            width: 100%;
        }
        .chart-box {
            background-color: #252526;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            flex: 1;
            height: 150px;
            position: relative;
        }
        .chart-box h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #ddd;
        }
        canvas {
            width: 100%;
            height: calc(100% - 30px);
        }
        
        #historyIndicator {
            font-size: 14px;
            color: #a0a0a0;
            margin: 0 10px;
        }
    </style>
</head>
<body>

    <div id="dropZone">
        Drop log file here to analyze
    </div>

    <h1>
        <span>HytaleGenerator Performance Report Visualizer <span id="status" style="font-size: 12px; font-weight: normal; color: #888; margin-left: 10px;">Drag & Drop a log file anywhere</span></span>
        <div class="controls">
            <button id="btnPrev" disabled>&laquo; Older</button>
            <span id="historyIndicator">No Data</span>
            <button id="btnNext" disabled>Newer &raquo;</button>
            <button id="btnLatest" disabled>Live / Latest</button>
            <button onclick="document.getElementById('fileInput').click()">Select File</button>
            <input type="file" id="fileInput" accept=".txt,.log" />
        </div>
    </h1>
    
    <div id="visualizerContainer" style="display: none;">
        
        <div class="charts-container">
            <div class="chart-box">
                <h3>Total Time History (ms)</h3>
                <canvas id="timeChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>Total Buffers Memory (MB)</h3>
                <canvas id="memoryChart"></canvas>
            </div>
        </div>

        <div class="container">
            <div class="card" id="card-general">
                <h2>General</h2>
                <div class="stat-list"></div>
            </div>
            <div class="card" id="card-stages">
                <h2>Stages (ms)</h2>
                <div class="stat-list"></div>
            </div>
            <div class="card" id="card-memory">
                <h2>Memory Usage (MB)</h2>
                <div class="stat-list"></div>
            </div>
            <div class="card" id="card-cache">
                <h2>Buffer Cache</h2>
                <div class="stat-list"></div>
            </div>
        </div>
    </div>

    <script>
        let fileHandle = null;
        let staticFile = null;
        let lastModified = 0;
        let pollInterval = null;
        
        let allReports = [];
        let viewIndex = -1; // -1 means no data, allReports.length - 1 means latest

        // Tolerance for noise
        const NOISE_TOLERANCE_MS = 1.0; 
        const NOISE_TOLERANCE_MB = 1.0;
        const NOISE_TOLERANCE_PERCENT = 0.1;

        // UI Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const btnLatest = document.getElementById('btnLatest');
        const historyIndicator = document.getElementById('historyIndicator');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleStaticFile(e.target.files[0]);
            }
        });

        // Global Drag and drop logic
        let dragCounter = 0;
        window.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            dropZone.classList.add('active');
        });
        window.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter === 0) {
                dropZone.classList.remove('active');
            }
        });
        window.addEventListener('dragover', (e) => { e.preventDefault(); });
        window.addEventListener('drop', async (e) => {
            e.preventDefault();
            dragCounter = 0;
            dropZone.classList.remove('active');

            if (!e.dataTransfer.items || e.dataTransfer.items.length === 0) return;

            const item = e.dataTransfer.items[0];
            if (item.kind !== 'file') return;

            try {
                if ('getAsFileSystemHandle' in item) {
                    const handle = await item.getAsFileSystemHandle();
                    if (handle && handle.kind === 'file') {
                        startLiveTracking(handle);
                        return;
                    }
                }
            } catch (err) {
                console.warn("Falling back to static file drop.", err);
            }

            const file = item.getAsFile();
            if (file) handleStaticFile(file);
        });

        function handleStaticFile(file) {
            fileHandle = null;
            staticFile = file; 
            document.getElementById('status').innerText = `Viewing ${file.name}`;
            document.getElementById('visualizerContainer').style.display = 'block';
            startPolling();
        }

        function startLiveTracking(handle) {
            fileHandle = handle;
            staticFile = null;
            document.getElementById('status').innerText = `Tracking ${handle.name} live...`;
            document.getElementById('visualizerContainer').style.display = 'block';
            startPolling();
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            checkFile(); 
            pollInterval = setInterval(checkFile, 2000);
        }

        async function checkFile() {
            try {
                let file;
                if (fileHandle) {
                    file = await fileHandle.getFile();
                } else if (staticFile) {
                    file = staticFile;
                } else {
                    return;
                }

                if (file.lastModified > lastModified || lastModified === 0) {
                    lastModified = file.lastModified;
                    const text = await file.text();
                    processLog(text);
                }
            } catch (error) {
                console.error("Error reading file:", error);
            }
        }

        function processLog(text) {
            const rawReports = text.split('[HytaleGenerator] Performance Report');
            if (rawReports.length < 2) return; 

            // Parse all reports that have actual content (skip the first split part if empty header)
            const newParsedReports = [];
            for (let i = 1; i < rawReports.length; i++) {
                if (rawReports[i].trim().length > 0) {
                    newParsedReports.push(parseReport(rawReports[i]));
                }
            }

            if (newParsedReports.length === 0) return;

            // If new reports came in, update the list 
            // Only update viewIndex automatically if we were already looking at the latest
            const wasAtLatest = (viewIndex === allReports.length - 1 || allReports.length === 0);
            
            allReports = newParsedReports;
            
            if (wasAtLatest) {
                viewIndex = allReports.length - 1;
            }

            updateView();
            drawCharts();
        }

        function parseReport(reportText) {
            const lines = reportText.split('\n');
            const data = { general: {}, stages: {}, memory: {}, cache: {} };
            let currentSection = data.general;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                if (line.startsWith('Sample Count:')) {
                    data.sampleCount = line.split(':')[1].trim();
                } else if (line.startsWith('Total:')) {
                    data.general['Total Time'] = parseFloat(line.split(':')[1].trim());
                } else if (line.startsWith('Content Generation:')) {
                    data.general['Content Generation'] = parseFloat(line.split(':')[1].trim());
                } else if (line.startsWith('Data Transfer:')) {
                    data.general['Data Transfer'] = parseFloat(line.split(':')[1].trim());
                } else if (line.includes('Stage') && line.includes('ms')) {
                    const match = line.match(/(.*Stage.*?):\s*([\d.]+)\s*ms/);
                    if (match) data.stages[match[1].trim()] = parseFloat(match[2]);
                } else if (line.startsWith('Memory Usage Report')) {
                    currentSection = data.memory;
                } else if (line.startsWith('Buffers Memory Usage:')) {
                    data.memory['Total Buffers'] = parseFloat(line.split(':')[1].trim());
                } else if (line.includes('Memory Footprint:') && currentSection === data.memory) {
                    const prevLine = lines[i-1].trim();
                    const match = prevLine.match(/(.* Grid \(Index.*?\)):/);
                    if (match) {
                        const valMatch = line.match(/Memory Footprint:\s*([\d.]+)\s*mb/);
                        if (valMatch) data.memory[match[1]] = parseFloat(valMatch[1]);
                    }
                } else if (line.startsWith('Buffer Cache Report')) {
                    currentSection = data.cache;
                } else if (line.startsWith('Missed/Total Ratio:')) {
                    data.cache['Missed/Total Ratio'] = parseFloat(line.split(':')[1].trim().replace('%', ''));
                } else if (line.startsWith('Total Cache Buffer Requests:')) {
                    data.cache['Total Requests'] = parseFloat(line.split(':')[1].trim());
                }
            }
            return data;
        }

        function updateView() {
            if (viewIndex < 0 || viewIndex >= allReports.length) return;

            const latest = allReports[viewIndex];
            const prev = (viewIndex > 0) ? allReports[viewIndex - 1] : null;

            renderSection('card-general', latest.general, prev ? prev.general : null, NOISE_TOLERANCE_MS, 'ms');
            renderSection('card-stages', latest.stages, prev ? prev.stages : null, NOISE_TOLERANCE_MS, 'ms');
            renderSection('card-memory', latest.memory, prev ? prev.memory : null, NOISE_TOLERANCE_MB, 'MB');
            renderSection('card-cache', latest.cache, prev ? prev.cache : null, NOISE_TOLERANCE_PERCENT, '%');

            // Update buttons
            btnPrev.disabled = (viewIndex === 0);
            btnNext.disabled = (viewIndex === allReports.length - 1);
            btnLatest.disabled = (viewIndex === allReports.length - 1);
            
            if (viewIndex === allReports.length - 1) {
                historyIndicator.innerText = `[Live] Report ${viewIndex + 1} / ${allReports.length}`;
            } else {
                historyIndicator.innerText = `[History] Report ${viewIndex + 1} / ${allReports.length}`;
            }
        }

        function renderSection(cardId, currentData, prevData, tolerance, unit) {
            const card = document.getElementById(cardId);
            const list = card.querySelector('.stat-list');
            list.innerHTML = '';

            for (const key in currentData) {
                const val = currentData[key];
                const prevVal = prevData ? prevData[key] : null;
                
                const row = document.createElement('div');
                row.className = 'stat-row';
                
                const nameDiv = document.createElement('div');
                nameDiv.className = 'stat-name';
                nameDiv.innerText = key;

                const valDiv = document.createElement('div');
                valDiv.className = 'stat-value';

                let displayVal = `${val.toFixed(2)} ${unit}`;
                if (key === 'Total Requests') displayVal = val.toString(); 

                const textSpan = document.createElement('span');
                textSpan.innerText = displayVal;
                
                valDiv.appendChild(textSpan);

                if (prevVal !== null && prevVal !== undefined) {
                    const diff = val - prevVal;
                    if (Math.abs(diff) > tolerance) {
                        const arrow = document.createElement('span');
                        arrow.className = `arrow ${diff > 0 ? 'up' : 'down'}`;
                        arrow.innerHTML = diff > 0 ? '▲' : '▼';
                        arrow.title = `${diff > 0 ? '+' : ''}${diff.toFixed(2)} ${unit}`;
                        valDiv.appendChild(arrow);
                    } else if (Math.abs(diff) <= tolerance && Math.abs(diff) > 0) {
                        const arrow = document.createElement('span');
                        arrow.className = 'arrow neutral';
                        arrow.innerHTML = '▶';
                        arrow.title = `Stable (Diff: ${diff > 0 ? '+' : ''}${diff.toFixed(2)} ${unit})`;
                        valDiv.appendChild(arrow);
                    }
                }
                row.appendChild(nameDiv);
                row.appendChild(valDiv);
                list.appendChild(row);
            }
        }

        // Navigation Handles
        btnPrev.addEventListener('click', () => {
            if (viewIndex > 0) { viewIndex--; updateView(); drawCharts(); }
        });
        btnNext.addEventListener('click', () => {
            if (viewIndex < allReports.length - 1) { viewIndex++; updateView(); drawCharts(); }
        });
        btnLatest.addEventListener('click', () => {
            viewIndex = allReports.length - 1; updateView(); drawCharts();
        });

        // Small custom canvas charting 
        function drawCharts() {
            if (allReports.length === 0) return;
            
            const times = allReports.map(r => r.general['Total Time'] || 0);
            const mems = allReports.map(r => r.memory['Total Buffers'] || 0);

            drawSingleChart(document.getElementById('timeChart'), times, viewIndex, '#4cca88');
            drawSingleChart(document.getElementById('memoryChart'), mems, viewIndex, '#3794ff');
        }

        function drawSingleChart(canvas, dataArr, activeIndex, color) {
            const ctx = canvas.getContext('2d');
            // Adjust resolution for sharpness
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            
            const w = canvas.width;
            const h = canvas.height;
            const padding = 10;
            
            ctx.clearRect(0, 0, w, h);
            if (dataArr.length <= 1) {
                ctx.fillStyle = '#666';
                ctx.font = '12px sans-serif';
                ctx.fillText("Waiting for more data points...", 10, h/2);
                return;
            }

            const minVal = Math.min(...dataArr) * 0.95;
            const maxVal = Math.max(...dataArr) * 1.05;
            const range = maxVal - minVal || 1;

            const stepX = (w - padding * 2) / (dataArr.length - 1);

            // Draw line
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            for (let i = 0; i < dataArr.length; i++) {
                const x = padding + i * stepX;
                const y = padding + (h - padding * 2) - ((dataArr[i] - minVal) / range) * (h - padding * 2);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Draw current indicator
            if (activeIndex >= 0 && activeIndex < dataArr.length) {
                const currX = padding + activeIndex * stepX;
                const currY = padding + (h - padding * 2) - ((dataArr[activeIndex] - minVal) / range) * (h - padding * 2);
                
                // Vertical line
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.moveTo(currX, 0);
                ctx.lineTo(currX, h);
                ctx.stroke();

                // Point dot
                ctx.beginPath();
                ctx.fillStyle = "white";
                ctx.arc(currX, currY, 4, 0, Math.PI*2);
                ctx.fill();
            }
        }

        // Handle resizing window to redraw canvases to look correct
        window.addEventListener('resize', () => {
            drawCharts();
        });

    </script>
</body>
</html>
